<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser PDF Tools</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
</head>
<body>
    <div class="container">
        <h1>PDF Toolkit (Client-Side)</h1>
        <p id="status">Loading Python environment... please wait.</p>

        <hr>

        <section id="merger-section">
            <h2>Merge PDFs</h2>
            <input type="file" id="merge-input" multiple accept="application/pdf">
            <button onclick="runMerge()" id="merge-btn" disabled>Merge & Download</button>
        </section>

        <hr>

        <section id="compressor-section">
            <h2>Compress PDF</h2>
            <input type="file" id="compress-input" accept="application/pdf">
            <button onclick="runCompress()" id="compress-btn" disabled>Compress & Download</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
