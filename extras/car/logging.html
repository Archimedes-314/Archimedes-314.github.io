<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vehicle Pre-Start Check</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#005bbb">

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  margin:0;padding:15px;background:#f2f4f7
}
h1{text-align:center;font-size:1.4rem;color:#002b5c}
.card{
  background:white;padding:15px;border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  margin-bottom:20px
}
.section-title{font-weight:bold;margin:18px 0 8px}
input,textarea{
  width:100%;padding:12px;margin-top:6px;
  border-radius:8px;border:1px solid #ccc;
  font-size:1rem;box-sizing:border-box
}
textarea{resize:vertical}
button{
  width:100%;padding:14px;margin-top:10px;
  border:none;border-radius:10px;
  font-size:1rem;font-weight:bold;cursor:pointer
}
.primary{background:#005bbb;color:white}
.export{background:#0a8f3d;color:white}
.danger{background:#c62828;color:white}
.toggle{background:#002b5c;color:white;margin-bottom:15px}
.hidden{display:none}

.check-item{
  background:#f7f9fc;padding:12px;
  border-radius:10px;margin-bottom:10px;
  display:flex;justify-content:space-between;
  align-items:center;gap:10px
}
.check-label{font-size:0.95rem;font-weight:500;flex:1}
.status-buttons{display:flex;gap:6px}
.status-btn{
  padding:6px 10px;border-radius:20px;
  border:1px solid #ccc;background:#e0e0e0;
  cursor:pointer;font-size:0.8rem
}
.status-btn.active.good{background:#0a8f3d;color:white;border:none}
.status-btn.active.bad{background:#c62828;color:white;border:none}
.status-btn.active.na{background:#757575;color:white;border:none}

.summary-box{
  background:#e9f1fb;padding:10px;
  border-radius:10px;margin-bottom:15px;
  font-weight:bold
}

.entry{
  background:#e9f1fb;padding:12px;
  border-radius:10px;margin-bottom:12px
}

@media print{
  button, form {display:none}
  body{background:white}
}
</style>
</head>
<body>

<h1>Vehicle Full Pre-Start Check</h1>
<button class="toggle" onclick="toggleView()">Switch View</button>

<div id="formView" class="card">
<form id="checkForm">

<button 
type="button" 
class="secondary" 
onclick="setNow()"
>
  Use Current Date & Time
</button>

<div class="section-title">Date</div>
<input type="date" id="date" required>

<div class="section-title">Time</div>
<input type="time" id="time" required>

<div class="section-title">Vehicle ID / Rego</div>
<input type="text" id="vehicleId" required>

<div class="section-title">Odometer (km)</div>
<input type="number" id="odometer">

<div class="summary-box" id="liveSummary">
Good: 0 | Needs Attention: 0 | N/A: 0
</div>

<div id="checklist"></div>

<div class="section-title">Issues Found</div>
<textarea id="issues" rows="2"></textarea>

<div class="section-title">Driver Notes</div>
<textarea id="notes" rows="2"></textarea>

<button type="submit" class="primary">Save Pre-Check</button>
<button type="button" onclick="window.print()" class="export">Export PDF</button>
<button type="button" onclick="clearAll()" class="danger">Clear All Logs</button>

</form>
</div>

<div id="logView" class="hidden">
<div id="entries"></div>
</div>

<script>
const sections = {
  "Exterior Walk-Around": [
    "Body Damage","Fluid Leaks","Windshield",
    "Mirrors","Headlights","Brake Lights",
    "Indicators","Hazards","Reverse Lights"
  ],
  "Tires & Wheels": [
    "Tire Pressure","Tread Depth","Sidewall Condition",
    "Wheel Nuts","Spare Tire","Jack & Tools"
  ],
  "Engine Bay": [
    "Oil Level","Coolant Level","Brake Fluid",
    "Washer Fluid","Battery","Belts & Hoses"
  ],
  "Interior & Controls": [
    "Seatbelts","Horn","Wipers",
    "Warning Lights","Gauges","Heater/Defrost","A/C"
  ],
  "Operational Check": [
    "Brakes","Steering","Vibrations",
    "Unusual Noises","Transmission"
  ]
};

const checklistDiv = document.getElementById("checklist");
const summaryBox = document.getElementById("liveSummary");
const form = document.getElementById("checkForm");
const entriesDiv = document.getElementById("entries");

function setNow(){
  const now = new Date();
  document.getElementById("date").value = now.toISOString().split("T")[0];
  document.getElementById("time").value = now.toTimeString().slice(0,5);
}

// Build checklist
for (const section in sections){
  const title = document.createElement("div");
  title.className="section-title";
  title.textContent=section;
  checklistDiv.appendChild(title);

  sections[section].forEach(item=>{
    const div=document.createElement("div");
    div.className="check-item";
    div.dataset.item=item;
    div.innerHTML=`
      <div class="check-label">${item}</div>
      <div class="status-buttons">
        <button type="button" class="status-btn good">Good</button>
        <button type="button" class="status-btn bad">Needs Attention</button>
        <button type="button" class="status-btn na">N/A</button>
      </div>
    `;
    checklistDiv.appendChild(div);
  });
}

// Button toggle logic
document.addEventListener("click", function(e){
  if(!e.target.classList.contains("status-btn")) return;
  const parent=e.target.closest(".status-buttons");
  parent.querySelectorAll(".status-btn")
    .forEach(btn=>btn.classList.remove("active"));
  e.target.classList.add("active");
  updateSummary();
});

function updateSummary(){
  let good=0,bad=0,na=0;
  document.querySelectorAll(".check-item").forEach(item=>{
    if(item.querySelector(".good").classList.contains("active")) good++;
    if(item.querySelector(".bad").classList.contains("active")) bad++;
    if(item.querySelector(".na").classList.contains("active")) na++;
  });
  summaryBox.textContent=`Good: ${good} | Needs Attention: ${bad} | N/A: ${na}`;
}

// Save
form.addEventListener("submit", e=>{
  e.preventDefault();

  let checks=[], issuesList=[], incomplete=false;

  document.querySelectorAll(".check-item").forEach(item=>{
    const label=item.dataset.item;
    const good=item.querySelector(".good").classList.contains("active");
    const bad=item.querySelector(".bad").classList.contains("active");
    const na=item.querySelector(".na").classList.contains("active");

    if(!good && !bad && !na) incomplete=true;

    if(good) checks.push(label+": Good");
    if(bad){
      checks.push(label+": Needs Attention");
      issuesList.push(label);
    }
    if(na) checks.push(label+": N/A");
  });

  if(incomplete){
    alert("Please complete all checks before saving.");
    return;
  }

  if(issuesList.length>0){
    document.getElementById("issues").value=
      issuesList.join(", ");
  }

  const log={
    date:date.value,
    time:time.value,
    vehicleId:vehicleId.value,
    odometer:odometer.value,
    checks,
    issues:issues.value,
    notes:notes.value
  };

  const logs=JSON.parse(localStorage.getItem("carPrecheckLogs"))||[];
  logs.push(log);
  localStorage.setItem("carPrecheckLogs",JSON.stringify(logs));

  form.reset();
  document.querySelectorAll(".status-btn")
    .forEach(btn=>btn.classList.remove("active"));
  updateSummary();
  alert("Pre-check saved.");
});

// Logs
function toggleView(){
  formView.classList.toggle("hidden");
  logView.classList.toggle("hidden");
  loadEntries();
}

function loadEntries(){
  const logs=JSON.parse(localStorage.getItem("carPrecheckLogs"))||[];
  entriesDiv.innerHTML="";
  logs.slice().reverse().forEach(log=>{
    const div=document.createElement("div");
    div.className="entry";
    div.innerHTML=`
      <strong>${log.date} ${log.time}</strong><br>
      <strong>Vehicle:</strong> ${log.vehicleId}<br>
      <strong>Odometer:</strong> ${log.odometer||"—"} km<br>
      <strong>Issues:</strong> ${log.issues||"None"}<br>
      <strong>Notes:</strong> ${log.notes||"—"}
    `;
    entriesDiv.appendChild(div);
  });
}

function clearAll(){
  if(confirm("Delete ALL logs?")){
    localStorage.removeItem("carPrecheckLogs");
    loadEntries();
  }
}

// PWA Service Worker
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE_NAME='vehicle-precheck-v2';
    self.addEventListener('install',e=>{
      self.skipWaiting();
      e.waitUntil(
        caches.open(CACHE_NAME)
        .then(cache=>cache.addAll(['./']))
      );
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(
        caches.match(e.request)
        .then(res=>res||fetch(e.request))
      );
    });
  `;
  const blob=new Blob([swCode],{type:'text/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl);
}

updateSummary();
</script>

</body>
</html>
